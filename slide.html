<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Pro - Ágora</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="stylesheet" href="slide.css">
</head>
<body>

    <div class="barra-superior">
        <div class="area-info">
            <button id="btn-toggle-modelos" class="btn-icone" style="color: #c084fc; margin-right: 5px;" title="Modelos e Templates">
                <span class="material-symbols-outlined">space_dashboard</span>
            </button>
            <span class="material-symbols-outlined" style="color: #8e44ad;">polyline</span>
            <h1 id="titulo-projeto-topo">Carregando...</h1>
            <span id="status-nuvem" class="status-nuvem">☁️</span>
        </div>

        <div class="area-menus">
            <div class="dropdown">
                <button class="dropdown-btn">Editar <span class="material-symbols-outlined" style="font-size:14px;">expand_more</span></button>
                <div class="dropdown-content">
                    <button class="dropdown-item" id="btn-undo"><span class="material-symbols-outlined">undo</span> Desfazer Passo</button>
                    <button class="dropdown-item" id="btn-redo"><span class="material-symbols-outlined">redo</span> Refazer Passo</button>
                    <div class="dropdown-divisor"></div>
                    <button class="dropdown-item" id="btn-copy"><span class="material-symbols-outlined">content_copy</span> Copiar Seleção (Ctrl+C)</button>
                    <button class="dropdown-item" id="btn-paste"><span class="material-symbols-outlined">content_paste</span> Colar (Ctrl+V)</button>
                    <div class="dropdown-divisor"></div>
                    <button class="dropdown-item" id="btn-reset-zoom"><span class="material-symbols-outlined">center_focus_strong</span> Centralizar Visão (100%)</button>
                    <div class="dropdown-divisor"></div>
                    <button class="dropdown-item" id="ferramenta-excluir" style="color:#fca5a5;"><span class="material-symbols-outlined" style="color:#fca5a5;">delete</span> Apagar Seleção</button>
                    <button class="dropdown-item" id="ferramenta-limpar-tudo" style="color:#e74c3c;"><span class="material-symbols-outlined" style="color:#e74c3c;">delete_forever</span> Limpar Slide Inteiro</button>
                </div>
            </div>

            <div class="dropdown">
                <button class="dropdown-btn">Inserir <span class="material-symbols-outlined" style="font-size:14px;">expand_more</span></button>
                <div class="dropdown-content">
                    <button class="dropdown-item" id="ferramenta-texto"><span class="material-symbols-outlined">text_fields</span> Caixa de Texto</button>
                    <button class="dropdown-item" id="btn-inserir-imagem"><span class="material-symbols-outlined">image</span> Imagem do Computador</button>
                    <input type="file" id="input-imagem-pc" accept="image/*" style="display: none;">
                </div>
            </div>

            <div class="dropdown">
                <button class="dropdown-btn">Formas <span class="material-symbols-outlined" style="font-size:14px;">expand_more</span></button>
                <div class="dropdown-content">
                    <button class="dropdown-item" id="ferramenta-quadrado"><span class="material-symbols-outlined">square</span> Retângulo / Quadrado</button>
                    <button class="dropdown-item" id="ferramenta-circulo"><span class="material-symbols-outlined">circle</span> Círculo / Elipse</button>
                    <button class="dropdown-item" id="ferramenta-triangulo"><span class="material-symbols-outlined">change_history</span> Triângulo</button>
                    <div class="dropdown-divisor"></div>
                    <button class="dropdown-item" id="ferramenta-linha"><span class="material-symbols-outlined">horizontal_rule</span> Linha Reta</button>
                    <button class="dropdown-item" id="ferramenta-linha-pontilhada"><span class="material-symbols-outlined">more_horiz</span> Linha Pontilhada</button>
                    <button class="dropdown-item" id="ferramenta-seta"><span class="material-symbols-outlined">arrow_right_alt</span> Seta de Ligação</button>
                </div>
            </div>

            <button id="ferramenta-desenho" class="btn-solto"><span class="material-symbols-outlined" style="font-size:18px;">draw</span> Desenhar</button>

            <div class="dropdown" id="menu-estilo">
                <button class="dropdown-btn">Estilo <span class="material-symbols-outlined" style="font-size:14px;">expand_more</span></button>
                <div class="dropdown-content">
                    <div class="estilo-linha">
                        <span>Fundo / Cor Interna</span>
                        <input type="color" id="cor-preenchimento" class="entrada-cor" value="#ffffff">
                    </div>
                    <div class="estilo-linha">
                        <span>Borda / Cor da Tinta</span>
                        <input type="color" id="cor-borda" class="entrada-cor" value="#2c3e50">
                    </div>
                    <div class="dropdown-divisor"></div>
                    <button class="dropdown-item" id="btn-tema-quadro"><span class="material-symbols-outlined">invert_colors</span> Inverter Fundo do Quadro</button>
                    <div class="dropdown-divisor"></div>
                    <div class="estilo-linha">
                        <span>Fonte:</span>
                        <select id="sel-fonte" class="caixa-select"><option value="Arial">Arial</option><option value="Times New Roman">Times</option><option value="Courier New">Courier</option></select>
                    </div>
                    <div style="display:flex; padding: 5px 15px; gap:5px;">
                        <button id="btn-bold" class="btn-icone" style="flex:1;" title="Negrito"><span class="material-symbols-outlined">format_bold</span></button>
                        <button id="btn-italic" class="btn-icone" style="flex:1;" title="Itálico"><span class="material-symbols-outlined">format_italic</span></button>
                        <button id="btn-align-left" class="btn-icone" style="flex:1;" title="Esquerda"><span class="material-symbols-outlined">format_align_left</span></button>
                        <button id="btn-align-center" class="btn-icone" style="flex:1;" title="Centro"><span class="material-symbols-outlined">format_align_center</span></button>
                    </div>
                </div>
            </div>

            <div class="dropdown">
                <button class="dropdown-btn">Organizar <span class="material-symbols-outlined" style="font-size:14px;">expand_more</span></button>
                <div class="dropdown-content">
                    <button class="dropdown-item" id="btn-trazer-frente"><span class="material-symbols-outlined">flip_to_front</span> Trazer para a Frente</button>
                    <button class="dropdown-item" id="btn-enviar-tras"><span class="material-symbols-outlined">flip_to_back</span> Enviar para o Fundo</button>
                </div>
            </div>
        </div>

        <div class="area-acoes">
            <button id="btn-exportar-modal" class="btn-texto btn-exportar" title="Salvar em PDF ou Imagem"><span class="material-symbols-outlined" style="font-size:16px;">download</span> Exportar</button>
            <button id="btn-abrir-arquivos" class="btn-icone" title="Meus Arquivos / Assets"><span class="material-symbols-outlined">folder_open</span></button>
            <button id="btn-abrir-equipe" class="btn-icone" title="Equipe"><span class="material-symbols-outlined">group</span></button>
            <button id="btn-reabrir-chat" class="btn-texto btn-acao-destaque"><span class="material-symbols-outlined" style="font-size:16px;">forum</span> Chat</button>
            <button id="btn-sair-esc" class="btn-texto btn-sair" title="Sair do Projeto"><span class="material-symbols-outlined" style="font-size:16px;">close</span></button>
        </div>
    </div>

    <div class="area-trabalho">
        
        <div class="gaveta-esquerda" id="caixa-modelos">
            <div class="cabecalho-gaveta" style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0; font-size:18px; color:#2c3e50;">Modelos</h2>
                <button id="btn-fechar-modelos" class="btn-icone" style="color:#94a3b8;"><span class="material-symbols-outlined">close</span></button>
            </div>
            
            <div class="conteudo-modelos">
                <div class="busca-ia-container">
                    <input type="text" placeholder="Descreva seu design ideal">
                    <span class="material-symbols-outlined" title="Ditar por voz">mic</span>
                </div>
                
                <div class="botoes-ia-container">
                    <button class="btn-ia-gerar" onclick="alert('Sistema de Inteligência Artificial será ativado em breve nas próximas atualizações!')">
                        <span class="material-symbols-outlined" style="color:#f1c40f;">auto_awesome</span> Gerar
                    </button>
                    <button class="btn-ia-buscar">Buscar</button>
                </div>
                
                <div class="grid-modelos-canva" id="grid-ia-modelos"></div>
                <div class="separador-modelos"><span>Modelos Prontos</span></div>
                <div class="grid-modelos-canva" id="grid-comunidade-modelos"></div>
            </div>
        </div>

        <div class="area-canvas" id="container-canvas">
            <div class="canvas-wrapper"><canvas id="canvas-slide"></canvas></div>
        </div>
        
        <div class="dock-miniaturas">
            <button id="btn-adicionar-slide" class="btn-add-dock">
                <span class="material-symbols-outlined">add_circle</span> Novo Slide
            </button>
            <div id="lista-de-miniaturas" style="display:flex; gap:10px;"></div>
        </div>

        <div class="gaveta-lateral" id="caixa-do-chat">
            <div class="cabecalho-gaveta">
                <span class="titulo-gaveta"><span class="material-symbols-outlined">forum</span> Chat</span>
                <div style="display:flex; gap:10px;">
                    <button id="btn-minimizar-chat" class="btn-icone" style="color:#2c3e50;"><span class="material-symbols-outlined">close</span></button>
                </div>
            </div>
            <div class="mensagens" id="chat-mensagens"></div>
            <div class="caixa-digitar">
                <input type="text" id="input-chat" placeholder="Mensagem...">
                <button id="btn-enviar-msg" class="btn-enviar"><span class="material-symbols-outlined" style="font-size:16px;">send</span></button>
            </div>
        </div>

        <div class="gaveta-lateral" id="caixa-arquivos">
            <div class="cabecalho-gaveta">
                <span class="titulo-gaveta"><span class="material-symbols-outlined">folder_open</span> Meus Arquivos</span>
                <button id="btn-minimizar-arquivos" class="btn-icone" style="color:#2c3e50;"><span class="material-symbols-outlined">close</span></button>
            </div>
            <button id="btn-fazer-upload" class="btn-upload-gigante"><span class="material-symbols-outlined">cloud_upload</span> Enviar Imagem</button>
            <input type="file" id="input-upload-real" accept="image/*" style="display: none;">
            <div class="area-arquivos-grid" id="grid-de-arquivos"></div>
        </div>
    </div>

    <div class="fundo-modal" id="modal-preview-modelo">
        <div class="caixa-modal">
            <div class="preview-header">
                <div>
                    <h2 id="titulo-preview-modelo" style="margin:0; font-size:18px; color:#2c3e50;">Visualizar Modelo</h2>
                </div>
                <button class="btn-icone" onclick="document.getElementById('modal-preview-modelo').style.display='none'"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div class="preview-body">
                <img id="img-preview-modelo" src="" alt="Preview">
            </div>
            <div class="preview-footer">
                <button class="btn-fechar-modal" onclick="document.getElementById('modal-preview-modelo').style.display='none'">Cancelar</button>
                <button class="btn-aplicar-modelo" id="btn-aplicar-modelo-real"><span class="material-symbols-outlined">exit_to_app</span> Exportar pra tela atual</button>
            </div>
        </div>
    </div>

    <div class="fundo-modal" id="modal-equipe">
        <div class="caixa-modal">
            <h2 style="margin-top:0; color: #2c3e50;"><span class="material-symbols-outlined" style="vertical-align: middle; color: #8e44ad;">group</span> Equipe do Projeto</h2>
            <div class="linha-add">
                <input type="email" id="email-convidado" placeholder="E-mail do colega">
                <select id="cargo-convidado"><option value="editor">Editor</option><option value="leitor">Leitor</option><option value="admin">Admin</option></select>
                <button id="btn-add-membro" class="btn-add">Convidar</button>
            </div>
            <p style="font-size: 12px; font-weight: bold; color:#7f8c8d; border-bottom: 1px solid #eee; padding-bottom: 5px;">MEMBROS ATUAIS</p>
            <div class="lista-membros" id="lista-membros"></div>
            
            <div style="margin-top: 15px; display: flex; gap: 10px; align-items: center;">
                <input type="text" id="link-gerado" readonly class="caixa-select" style="flex-grow: 1; padding: 10px; font-size: 13px;">
                <button class="btn-add" id="btn-copiar-link" style="display: flex; align-items: center; gap: 5px; white-space: nowrap;">
                    <span class="material-symbols-outlined" style="font-size: 16px;">content_copy</span> Copiar Link
                </button>
            </div>
            <button class="btn-fechar-modal" onclick="document.getElementById('modal-equipe').style.display='none'" style="margin-top: 15px; width: 100%;">Fechar</button>
        </div>
    </div>

    <div class="fundo-modal" id="modal-exportar">
        <div class="caixa-modal">
            <h2 style="margin-top:0; color: #2c3e50;"><span class="material-symbols-outlined" style="vertical-align: middle; color: #8e44ad;">download</span> Exportar Projeto</h2>
            <div class="opcoes-export">
                <button class="btn-opcao-export" id="btn-baixar-png">
                    <span class="material-symbols-outlined">image</span>
                    <div><strong>Imagem (PNG)</strong><span>Baixa apenas o slide atual em alta qualidade.</span></div>
                </button>
                <button class="btn-opcao-export" id="btn-baixar-pdf">
                    <span class="material-symbols-outlined">picture_as_pdf</span>
                    <div><strong>Documento (PDF)</strong><span>Junta todos os slides num único ficheiro PDF.</span></div>
                </button>
            </div>
            <button class="btn-fechar-modal" onclick="document.getElementById('modal-exportar').style.display='none'" style="width:100%;">Cancelar</button>
        </div>
    </div>

    <script type="module" src="slide.js"></script>

</body>
</html>
