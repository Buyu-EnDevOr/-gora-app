<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Textos Pro - Ágora</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://meet.jit.si/external_api.js"></script>

    <style>
        /* ========================================== */
        /* RESET E LAYOUT PRINCIPAL                   */
        /* ========================================== */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; background-color: #e2e8f0; height: 100vh; overflow: hidden; transition: 0.3s; }
        
        /* O SISTEMA DE BARRAS DINÂMICAS */
        .container-barras { position: relative; width: 100%; height: 60px; background-color: #111827; border-bottom: 1px solid #1f2937; z-index: 100; flex-shrink: 0; }
        .barra-superior { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-sizing: border-box; transition: opacity 0.3s, transform 0.3s; opacity: 1; transform: translateY(0); pointer-events: auto; }
        .barra-superior.escondida { opacity: 0; transform: translateY(-10px); pointer-events: none; }
        
        .area-info { display: flex; align-items: center; gap: 10px; min-width: 200px; flex-shrink: 0;}
        .area-info h1 { margin: 0; font-size: 16px; color: #f8fafc; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
        .status-nuvem { font-size: 11px; color: #94a3b8; font-weight: bold; }
        
        .area-menus { display: flex; gap: 5px; align-items: center; flex-grow: 1; justify-content: flex-start; overflow-x: auto;}
        .area-menus::-webkit-scrollbar { display: none; }
        .area-acoes { display: flex; gap: 8px; align-items: center; justify-content: flex-end; flex-shrink: 0;}
        
        .divisor-vertical { width: 1px; height: 25px; background-color: #334155; margin: 0 10px; }

        /* ESTILOS DE BOTÕES DA BARRA (Copiados do seu Slides) */
        .btn-solto { background: transparent; border: none; color: #cbd5e1; padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: 0.2s; white-space: nowrap;}
        .btn-solto:hover { background: #1e293b; color: white; }
        .btn-solto.ativo { background: #8e44ad; color: white; }
        
        .btn-icone { background: transparent; border: none; color: #cbd5e1; cursor: pointer; border-radius: 6px; padding: 6px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-icone:hover { background-color: #334155; color: white; }
        .btn-texto { background: #334155; border: none; color: white; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 4px; }
        .btn-texto:hover { background: #475569; }
        .btn-acao-destaque { background: #8e44ad; color: white; }
        .btn-acao-destaque:hover { background: #7d3c98; }

        .caixa-select { padding: 6px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; cursor: pointer; font-size: 12px; }
        .entrada-cor { border: none; padding: 0; width: 24px; height: 24px; cursor: pointer; background: transparent; border-radius: 50%; overflow: hidden; }

        /* ========================================== */
        /* ÁREA DE EDIÇÃO (A FOLHA DE PAPEL)          */
        /* ========================================== */
        .area-trabalho { flex-grow: 1; display: flex; position: relative; overflow: hidden; background-color: #e2e8f0;}
        .container-editor-scroll { flex-grow: 1; overflow-y: auto; display: flex; justify-content: center; padding: 40px 20px; transition: 0.3s;}
        
        #editor-container { 
            background: white; 
            width: 100%; 
            max-width: 850px; 
            min-height: 1000px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            border: none !important; 
            transition: background 0.3s, color 0.3s;
        }
        .ql-container { font-size: 16px; font-family: 'Arial', sans-serif; border: none !important;}
        .ql-editor { padding: 60px 80px; line-height: 1.6; min-height: 1000px; color: #2c3e50;}

        /* ========================================== */
        /* CHAT LATERAL E VÍDEO (Do seu Slides)       */
        /* ========================================== */
        .gaveta-lateral { width: 320px; background-color: white; box-shadow: -5px 0 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); position: absolute; right: 0; top: 0; height: 100%; z-index: 90; border-left: 1px solid #eee; transform: translateX(100%); }
        .gaveta-lateral.aberto { transform: translateX(0); }
        .cabecalho-gaveta { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .titulo-gaveta { font-weight: bold; color: #2c3e50; display: flex; align-items: center; gap: 5px;}
        .btn-ligar-chamada { background: #27ae60; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: 0.2s;}
        .mensagens { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-color: #fafbfc; }
        .mensagem-linha { display: flex; gap: 10px; align-items: flex-end; }
        .mensagem-linha.minha { flex-direction: row-reverse; }
        .foto-perfil-chat { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; }
        .msg { padding: 10px 15px; border-radius: 15px; font-size: 13px; word-wrap: break-word; max-width: 80%; margin: 0;}
        .msg-outro { background-color: #ecf0f1; color: #2c3e50;}
        .msg-minha { background-color: #8e44ad; color: white; }
        .nome-user { font-size: 10px; color: #7f8c8d; margin-bottom: 3px; display: block; }
        .mensagem-linha.minha .nome-user { text-align: right; }
        .caixa-digitar { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; background: white; }
        .caixa-digitar input { flex-grow: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; font-size: 13px; }
        .btn-enviar { background: #8e44ad; color: white; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;}

        .container-video { position: fixed; bottom: 20px; left: 20px; width: 350px; height: 400px; background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; z-index: 9999; border: 1px solid #ddd; transition: height 0.3s, width 0.3s; }
        .container-video.escondido { display: none; }
        .container-video.minimizado { height: 45px !important; }
        .container-video.tela-cheia { top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; border-radius: 0;}
        .cabecalho-video { background: #2c3e50; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; cursor: grab; user-select: none; font-size: 13px; font-weight: bold;}
        #jitsi-iframe { flex-grow: 1; background: #000; width: 100%; height: 100%; }

        /* ========================================== */
        /* MODO NOTURNO (Dark Mode "Folha Preta")     */
        /* ========================================== */
        body.dark-mode { background-color: #121212; }
        body.dark-mode .container-editor-scroll { background-color: #121212; }
        body.dark-mode #editor-container { background: #1e1e1e; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        body.dark-mode .ql-editor { color: #f8fafc; } /* Tinta Branca */
        
        body.dark-mode .gaveta-lateral, body.dark-mode .caixa-digitar { background-color: #1e1e1e; border-color: #333;}
        body.dark-mode .mensagens { background-color: #121212; }
        body.dark-mode .msg-outro { background-color: #333; color: white; }
        body.dark-mode .caixa-digitar input { background-color: #2a2a2a; border-color: #444; color: white; }
        body.dark-mode .titulo-gaveta { color: white; }

        /* ========================================== */
        /* MODAIS                                     */
        /* ========================================== */
        .fundo-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 5000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(5px);}
        .caixa-modal { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.2);}
        
        .linha-add { display: flex; gap: 10px; margin-top: 15px; margin-bottom: 20px; flex-wrap: wrap;}
        .linha-add input, .linha-add select { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none;}
        .btn-add { background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .lista-membros { max-height: 150px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; padding: 10px; margin-bottom: 20px; }
        .membro-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        .btn-fechar-modal { width: 100%; background: #ecf0f1; color: #2c3e50; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        
        body.dark-mode .caixa-modal { background: #1e293b; color: white; }
        body.dark-mode .linha-add input, body.dark-mode .linha-add select { background: #0f172a; border-color: #334155; color: white;}
        body.dark-mode .btn-fechar-modal { background: #334155; color: white; }
    </style>
</head>
<body>

    <div class="container-barras">
        
        <div class="barra-superior" id="barra-principal">
            <div class="area-info">
                <span class="material-symbols-outlined" style="color: #8e44ad;">description</span>
                <h1 id="titulo-projeto-topo">Carregando...</h1>
                <span id="status-nuvem" class="status-nuvem">☁️</span>
            </div>
            
            <div class="area-menus">
                <button class="btn-solto" onclick="mostrarBarra('barra-texto')"><span class="material-symbols-outlined">text_format</span> Formatar Texto</button>
                <button class="btn-solto" onclick="mostrarBarra('barra-paragrafo')"><span class="material-symbols-outlined">format_align_left</span> Parágrafo & Listas</button>
                <button class="btn-solto" onclick="mostrarBarra('barra-inserir')"><span class="material-symbols-outlined">add_circle</span> Inserir Mídia</button>
                <button class="btn-solto" onclick="document.getElementById('modal-modelos').style.display='flex'"><span class="material-symbols-outlined">auto_awesome</span> Modelos</button>
                <button class="btn-solto" id="btn-tema-quadro"><span class="material-symbols-outlined">dark_mode</span> Modo Escuro</button>
            </div>

            <div class="area-acoes">
                <button class="btn-texto" onclick="window.print()"><span class="material-symbols-outlined" style="font-size:16px;">print</span> Salvar PDF</button>
                <button id="btn-abrir-equipe" class="btn-icone" title="Gerenciar Equipe"><span class="material-symbols-outlined">group</span></button>
                <button id="btn-reabrir-chat" class="btn-texto btn-acao-destaque"><span class="material-symbols-outlined" style="font-size:16px;">forum</span> Chat</button>
                <button id="btn-sair-esc" class="btn-texto btn-sair" title="Sair do Projeto"><span class="material-symbols-outlined" style="font-size:16px;">close</span></button>
            </div>
        </div>

        <div class="barra-superior escondida" id="barra-texto">
            <div class="area-menus">
                <button class="btn-solto" onclick="mostrarBarra('barra-principal')"><span class="material-symbols-outlined">arrow_back</span> Voltar</button>
                <div class="divisor-vertical"></div>
                
                <select class="caixa-select" onchange="aplicarFormato('header', this.value)">
                    <option value="">Normal</option>
                    <option value="1">Título 1 (Gigante)</option>
                    <option value="2">Título 2</option>
                    <option value="3">Título 3</option>
                </select>
                <select class="caixa-select" onchange="aplicarFormato('font', this.value)">
                    <option value="">Fonte Padrão</option>
                    <option value="serif">Serif (Times)</option>
                    <option value="monospace">Monospace (Código)</option>
                </select>
                <div class="divisor-vertical"></div>
                
                <button class="btn-icone" onclick="aplicarFormato('bold')" title="Negrito"><span class="material-symbols-outlined">format_bold</span></button>
                <button class="btn-icone" onclick="aplicarFormato('italic')" title="Itálico"><span class="material-symbols-outlined">format_italic</span></button>
                <button class="btn-icone" onclick="aplicarFormato('underline')" title="Sublinhado"><span class="material-symbols-outlined">format_underlined</span></button>
                <button class="btn-icone" onclick="aplicarFormato('strike')" title="Riscado"><span class="material-symbols-outlined">strikethrough_s</span></button>
                <div class="divisor-vertical"></div>
                
                <span style="color:#cbd5e1; font-size: 12px;">Cor:</span>
                <input type="color" class="entrada-cor" onchange="aplicarFormato('color', this.value)" title="Cor da Letra">
                <span style="color:#cbd5e1; font-size: 12px; margin-left: 10px;">Fundo:</span>
                <input type="color" class="entrada-cor" onchange="aplicarFormato('background', this.value)" title="Cor de Fundo">
            </div>
            <div class="area-acoes">
                <button class="btn-texto" onclick="quill.history.undo()"><span class="material-symbols-outlined" style="font-size:16px;">undo</span> Desfazer</button>
                <button class="btn-texto" onclick="quill.history.redo()"><span class="material-symbols-outlined" style="font-size:16px;">redo</span> Refazer</button>
            </div>
        </div>

        <div class="barra-superior escondida" id="barra-paragrafo">
            <div class="area-menus">
                <button class="btn-solto" onclick="mostrarBarra('barra-principal')"><span class="material-symbols-outlined">arrow_back</span> Voltar</button>
                <div class="divisor-vertical"></div>
                
                <button class="btn-icone" onclick="aplicarFormato('align', '')" title="Esquerda"><span class="material-symbols-outlined">format_align_left</span></button>
                <button class="btn-icone" onclick="aplicarFormato('align', 'center')" title="Centro"><span class="material-symbols-outlined">format_align_center</span></button>
                <button class="btn-icone" onclick="aplicarFormato('align', 'right')" title="Direita"><span class="material-symbols-outlined">format_align_right</span></button>
                <button class="btn-icone" onclick="aplicarFormato('align', 'justify')" title="Justificado"><span class="material-symbols-outlined">format_align_justify</span></button>
                <div class="divisor-vertical"></div>
                
                <button class="btn-icone" onclick="aplicarFormato('list', 'ordered')" title="Lista Numerada"><span class="material-symbols-outlined">format_list_numbered</span></button>
                <button class="btn-icone" onclick="aplicarFormato('list', 'bullet')" title="Lista de Pontos"><span class="material-symbols-outlined">format_list_bulleted</span></button>
                <div class="divisor-vertical"></div>
                
                <button class="btn-icone" onclick="quill.format('indent', '-1')" title="Diminuir Recuo"><span class="material-symbols-outlined">format_indent_decrease</span></button>
                <button class="btn-icone" onclick="quill.format('indent', '+1')" title="Aumentar Recuo"><span class="material-symbols-outlined">format_indent_increase</span></button>
                <div class="divisor-vertical"></div>
                
                <button class="btn-icone" onclick="aplicarFormato('blockquote')" title="Citação"><span class="material-symbols-outlined">format_quote</span></button>
                <button class="btn-icone" onclick="aplicarFormato('code-block')" title="Bloco de Código"><span class="material-symbols-outlined">code</span></button>
            </div>
        </div>

        <div class="barra-superior escondida" id="barra-inserir">
            <div class="area-menus">
                <button class="btn-solto" onclick="mostrarBarra('barra-principal')"><span class="material-symbols-outlined">arrow_back</span> Voltar</button>
                <div class="divisor-vertical"></div>
                
                <button class="btn-solto" onclick="inserirLink()"><span class="material-symbols-outlined">link</span> Link (URL)</button>
                <button class="btn-solto" id="btn-upload-imagem"><span class="material-symbols-outlined">image</span> Inserir Imagem</button>
                <input type="file" id="input-imagem-firebase" accept="image/*" style="display: none;">
                <button class="btn-solto" onclick="inserirVideo()"><span class="material-symbols-outlined">smart_display</span> Inserir Vídeo (YouTube)</button>
            </div>
        </div>

    </div> <div class="area-trabalho">
        
        <div class="container-editor-scroll">
            <div id="editor-container"></div>
        </div>

        <div class="gaveta-lateral" id="caixa-do-chat">
            <div class="cabecalho-gaveta">
                <span class="titulo-gaveta"><span class="material-symbols-outlined">forum</span> Chat</span>
                <div style="display:flex; gap:10px;">
                    <button id="btn-iniciar-chamada" class="btn-ligar-chamada"><span class="material-symbols-outlined" style="font-size:14px;">videocam</span> Ligar Câmera</button>
                    <button id="btn-minimizar-chat" class="btn-icone" style="color:#2c3e50;"><span class="material-symbols-outlined">close</span></button>
                </div>
            </div>
            <div class="mensagens" id="chat-mensagens"></div>
            <div class="caixa-digitar">
                <input type="text" id="input-chat" placeholder="Escreva uma mensagem...">
                <button id="btn-enviar-msg" class="btn-enviar"><span class="material-symbols-outlined" style="font-size:16px;">send</span></button>
            </div>
        </div>
    </div>

    <div id="container-video" class="container-video escondido">
        <div class="cabecalho-video" id="cabecalho-drag">
            <span><span class="material-symbols-outlined" style="font-size: 14px; vertical-align: middle;">drag_indicator</span> Reunião Ao Vivo</span>
            <div style="display:flex; gap:5px;">
                <button id="btn-minimizar-video" class="btn-icone" style="color:white; padding:2px;"><span class="material-symbols-outlined" style="font-size:18px;">remove</span></button>
                <button id="btn-expandir-video" class="btn-icone" style="color:white; padding:2px;"><span class="material-symbols-outlined" style="font-size:18px;">crop_square</span></button>
                <button id="btn-fechar-video" class="btn-icone" style="color:white; padding:2px;"><span class="material-symbols-outlined" style="font-size:18px;">close</span></button>
            </div>
        </div>
        <div id="jitsi-iframe" style="flex:1;"></div>
    </div>

    <div class="fundo-modal" id="modal-equipe">
        <div class="caixa-modal">
            <h2 style="margin-top:0;"><span class="material-symbols-outlined" style="vertical-align: middle;">group</span> Equipe do Projeto</h2>
            <div class="linha-add">
                <input type="email" id="email-convidado" placeholder="E-mail do colega">
                <select id="cargo-convidado"><option value="editor">Editor</option><option value="leitor">Leitor</option><option value="admin">Admin</option></select>
                <button id="btn-add-membro" class="btn-add">Convidar</button>
            </div>
            <p style="font-size: 12px; font-weight: bold; color:#7f8c8d; border-bottom: 1px solid #eee; padding-bottom: 5px;">MEMBROS ATUAIS</p>
            <div class="lista-membros" id="lista-membros"></div>
            <input type="text" id="link-gerado" readonly style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 12px;">
            <button id="btn-copiar-link" class="btn-add" style="width: 100%; background: #3498db; margin-bottom: 20px;">Copiar Link da Sala</button>
            <button class="btn-fechar-modal" onclick="document.getElementById('modal-equipe').style.display='none'">Fechar</button>
        </div>
    </div>

    <div class="fundo-modal" id="modal-modelos">
        <div class="caixa-modal">
            <h2 style="margin-top:0;"><span class="material-symbols-outlined" style="vertical-align: middle;">auto_awesome</span> Modelos Prontos</h2>
            <div class="grid-modelos">
                <div class="cartao-modelo" onclick="aplicarModeloPronto('ata')">Ata de Reunião</div>
                <div class="cartao-modelo" onclick="aplicarModeloPronto('abnt')">Capa ABNT</div>
            </div>
            <button class="btn-fechar-modal" style="margin-top: 20px;" onclick="document.getElementById('modal-modelos').style.display='none'">Cancelar</button>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, query, orderBy, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyCrO7jKe3ja8XJWeNTfTpv4wwEWwzzcYzo", authDomain: "agora-ea1be.firebaseapp.com", projectId: "agora-ea1be", storageBucket: "agora-ea1be.firebasestorage.app", messagingSenderId: "801313514193", appId: "1:801313514193:web:99621b133ed4ca80e89bf0" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        const idProjeto = new URLSearchParams(window.location.search).get('id');
        if (!idProjeto) { window.location.href = "dashboard.html"; }

        let meuNome = "Anônimo", meuEmail = "", minhaFoto = "", meuCargo = "leitor";
        let carregamentoInicial = true, isAtualizandoPelaNuvem = false, timeoutSalvar;

        // SISTEMA DE TROCA DE BARRAS DINÂMICA
        window.mostrarBarra = function(idBarra) {
            document.querySelectorAll('.container-barras .barra-superior').forEach(b => b.classList.add('escondida'));
            document.getElementById(idBarra).classList.remove('escondida');
        }

        // INICIALIZA O QUILL (Sem a barra nativa!)
        window.quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'Comece a digitar o documento da sua equipe...',
            modules: { toolbar: false, history: { delay: 1000, maxStack: 500, userOnly: true } }
        });

        // APLICAR FORMATOS CUSTOMIZADOS NA FOLHA
        window.aplicarFormato = function(formato, valor = null) {
            if(meuCargo === 'leitor') return;
            const formatoAtual = quill.getFormat()[formato];
            if(valor === null) {
                quill.format(formato, !formatoAtual); // Liga/Desliga (Ex: Negrito)
            } else {
                quill.format(formato, formatoAtual === valor ? false : valor); // Aplica cor/fonte
            }
        }

        // UPLOAD DE IMAGEM PARA O FIREBASE DIRETO NO TEXTO
        document.getElementById('btn-upload-imagem').addEventListener('click', () => document.getElementById('input-imagem-firebase').click());
        document.getElementById('input-imagem-firebase').addEventListener('change', async function(e) {
            const file = e.target.files[0]; if (!file || meuCargo === 'leitor') return;
            document.getElementById('btn-upload-imagem').innerHTML = "⏳ Enviando...";
            const storageRef = ref(storage, `projetos/${idProjeto}/imagens_texto/${Date.now()}_${file.name}`);
            try { 
                await uploadBytes(storageRef, file); 
                const url = await getDownloadURL(storageRef); 
                const range = quill.getSelection(true);
                quill.insertEmbed(range.index, 'image', url);
                document.getElementById('btn-upload-imagem').innerHTML = '<span class="material-symbols-outlined">image</span> Inserir Imagem'; 
            } catch (error) { alert("Erro ao enviar imagem."); }
            this.value = ''; 
        });

        window.inserirLink = function() {
            let url = prompt("Cole o link aqui:");
            if (url) quill.format('link', url);
        }
        window.inserirVideo = function() {
            let url = prompt("Cole o link do YouTube:");
            if (url) { const range = quill.getSelection(true); quill.insertEmbed(range.index, 'video', url); }
        }

        // ==========================================
        // LÓGICA DO RESTO DO SISTEMA (Firebase, Chat, Tema)
        // ==========================================
        document.getElementById('btn-sair-esc').addEventListener('click', () => { window.location.href = "dashboard.html"; });
        
        const caixaChat = document.getElementById('caixa-do-chat');
        document.getElementById('btn-reabrir-chat').addEventListener('click', () => { caixaChat.classList.add('aberto'); });
        document.getElementById('btn-minimizar-chat').addEventListener('click', () => { caixaChat.classList.remove('aberto'); });
        
        const btnTema = document.getElementById('btn-tema-quadro');
        let isDark = localStorage.getItem('tema-agora') === 'escuro';
        if(isDark) document.body.classList.add('dark-mode');
        
        btnTema.addEventListener('click', () => {
            isDark = !isDark;
            if(isDark) { document.body.classList.add('dark-mode'); localStorage.setItem('tema-agora', 'escuro'); } 
            else { document.body.classList.remove('dark-mode'); localStorage.setItem('tema-agora', 'claro'); }
        });

        // VÍDEO E ARRASTAR
        let apiJitsi = null; const containerVideo = document.getElementById('container-video');
        document.getElementById('btn-iniciar-chamada').addEventListener('click', () => { containerVideo.classList.remove('escondido'); if(!apiJitsi) { apiJitsi = new JitsiMeetExternalAPI('meet.jit.si', { roomName: 'agora-' + idProjeto, width: '100%', height: '100%', parentNode: document.querySelector('#jitsi-iframe'), userInfo: { displayName: meuNome, avatarURL: minhaFoto } }); } });
        document.getElementById('btn-fechar-video').addEventListener('click', () => { containerVideo.classList.add('escondido'); if(apiJitsi) { apiJitsi.dispose(); apiJitsi = null; } });
        document.getElementById('btn-minimizar-video').addEventListener('click', () => containerVideo.classList.toggle('minimizado'));
        document.getElementById('btn-expandir-video').addEventListener('click', () => containerVideo.classList.toggle('tela-cheia'));
        
        const cabecalhoDrag = document.getElementById('cabecalho-drag'); let isDraggingVid = false, offsetXVid, offsetYVid;
        cabecalhoDrag.addEventListener('mousedown', (e) => { if(e.target.tagName === 'BUTTON') return; isDraggingVid = true; offsetXVid = e.clientX - containerVideo.getBoundingClientRect().left; offsetYVid = e.clientY - containerVideo.getBoundingClientRect().top; });
        document.addEventListener('mousemove', (e) => { if(isDraggingVid) { containerVideo.style.left = (e.clientX - offsetXVid) + 'px'; containerVideo.style.top = (e.clientY - offsetYVid) + 'px'; containerVideo.style.bottom = 'auto'; }});
        document.addEventListener('mouseup', () => isDraggingVid = false);

        // FIREBASE CORE
        onAuthStateChanged(auth, (user) => { 
            if (user) { meuEmail = user.email; meuNome = user.displayName || user.email.split('@')[0]; minhaFoto = user.photoURL || `https://ui-avatars.com/api/?name=${meuNome}&background=ecf0f1&color=8e44ad`; iniciarSala(); } 
            else { window.location.href = "index.html"; } 
        });

        function iniciarSala() {
            const linkMágico = `${window.location.origin}/convite.html?id=${idProjeto}`; document.getElementById('link-gerado').value = linkMágico;
            document.getElementById('btn-copiar-link').addEventListener('click', () => navigator.clipboard.writeText(linkMágico));
            document.getElementById('btn-abrir-equipe').addEventListener('click', () => document.getElementById('modal-equipe').style.display = 'flex');
            document.getElementById('btn-add-membro').addEventListener('click', async () => { const e = document.getElementById('email-convidado').value.trim(); const c = document.getElementById('cargo-convidado').value; if(e) { await updateDoc(doc(db, "projetos", idProjeto), { usuarios: arrayUnion(e), [`permissoes.${e}`]: c }); document.getElementById('email-convidado').value = ""; } });

            const docRef = doc(db, "projetos", idProjeto);
            onSnapshot(docRef, (snap) => {
                if (!snap.exists()) return;
                const dados = snap.data();
                document.getElementById('titulo-projeto-topo').innerText = dados.nome;
                
                meuCargo = dados.permissoes[meuEmail] || "leitor";
                if (meuCargo === "leitor") quill.disable(); else quill.enable();
                if(meuCargo !== "admin") document.getElementById('btn-abrir-equipe').style.display = 'none';

                const areaMembros = document.getElementById('lista-membros'); areaMembros.innerHTML = '';
                dados.usuarios.forEach(u => areaMembros.innerHTML += `<div class="membro-item"><span>${u}</span> <strong style="color:#8e44ad;">${(dados.permissoes[u] || "membro").toUpperCase()}</strong></div>`);

                if (carregamentoInicial && dados.conteudo) {
                    isAtualizandoPelaNuvem = true; quill.root.innerHTML = dados.conteudo; carregamentoInicial = false; setTimeout(() => isAtualizandoPelaNuvem = false, 500);
                } else if (!carregamentoInicial && dados.conteudo && !quill.hasFocus()) {
                    isAtualizandoPelaNuvem = true; quill.root.innerHTML = dados.conteudo; setTimeout(() => isAtualizandoPelaNuvem = false, 500);
                }
            });

            onSnapshot(query(collection(db, "projetos", idProjeto, "mensagens"), orderBy("hora", "asc")), (snap) => {
                const area = document.getElementById('chat-mensagens'); area.innerHTML = '';
                snap.forEach(d => { const m = d.data(); const isMinha = m.autorEmail === meuEmail; const f = m.autorFoto || `https://ui-avatars.com/api/?name=${m.autorNome}&background=ecf0f1&color=8e44ad`; area.innerHTML += `<div class="mensagem-linha ${isMinha ? 'minha' : ''}"><img src="${f}" class="foto-perfil-chat"><div class="area-texto-chat"><span class="nome-user">${isMinha ? 'Você' : m.autorNome}</span><div class="msg ${isMinha ? 'msg-minha' : 'msg-outro'}">${m.texto}</div></div></div>`; }); 
                area.scrollTop = area.scrollHeight;
            });
        }

        quill.on('text-change', function(delta, oldDelta, source) {
            if (source == 'user' && !isAtualizandoPelaNuvem && meuCargo !== "leitor") {
                document.getElementById('status-nuvem').innerText = "⏳ A Salvar...";
                clearTimeout(timeoutSalvar);
                timeoutSalvar = setTimeout(async () => {
                    await updateDoc(doc(db, "projetos", idProjeto), { conteudo: quill.root.innerHTML });
                    document.getElementById('status-nuvem').innerText = "☁️ Salvo";
                }, 1000);
            }
        });

        document.getElementById('btn-enviar-msg').addEventListener('click', () => { const i = document.getElementById('input-chat'); if(i.value.trim()){ addDoc(collection(db, "projetos", idProjeto, "mensagens"), { texto: i.value, autorEmail: meuEmail, autorNome: meuNome, autorFoto: minhaFoto, hora: Date.now() }); i.value = ''; } });
        document.getElementById('input-chat').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('btn-enviar-msg').click(); });

        window.aplicarModeloPronto = async function(tipo) {
            if(meuCargo === "leitor") return;
            const textos = {
                'ata': `<h2 style="text-align: center;">Ata de Reunião</h2><p><strong>Data:</strong> __/__/____</p><ul><li></li></ul>`,
                'abnt': `<br><br><br><h2 style="text-align: center;">UNIVERSIDADE</h2><br><br><br><h1 style="text-align: center;">TÍTULO</h1>`
            };
            if(confirm("Substituir o texto pelo modelo?")) {
                isAtualizandoPelaNuvem = true;
                quill.root.innerHTML = textos[tipo];
                await updateDoc(doc(db, "projetos", idProjeto), { conteudo: textos[tipo] });
                document.getElementById('modal-modelos').style.display = 'none';
                setTimeout(() => isAtualizandoPelaNuvem = false, 500);
            }
        }
    </script>
</body>
</html>
