<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor PDF - Ágora</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; background-color: #f4f7f6; height: 100vh; }
        .menu-lateral { width: 250px; background-color: #1a252f; color: white; height: 100vh; padding-top: 20px; flex-shrink: 0; }
        .logo { text-align: center; font-size: 24px; font-weight: 800; margin-bottom: 40px; color: #8e44ad; letter-spacing: 1px; }
        .menu-lateral a { display: block; color: #bdc3c7; padding: 15px 25px; text-decoration: none; font-size: 16px; transition: all 0.3s; border-left: 4px solid transparent; }
        .menu-lateral a:hover { background-color: #2c3e50; color: white; border-left: 4px solid #8e44ad; }
        
        .conteudo { flex-grow: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .cabecalho-pagina { width: 100%; max-width: 800px; margin-bottom: 30px; color: #2c3e50; }
        .cabecalho-pagina h1 { margin: 0 0 10px 0; font-size: 28px; }
        .cabecalho-pagina p { margin: 0; color: #7f8c8d; font-size: 16px; }

        .caixa-conversor { background-color: white; width: 100%; max-width: 800px; padding: 50px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); text-align: center; }
        .area-upload { border: 3px dashed #bdc3c7; border-radius: 15px; padding: 60px 20px; background-color: #fafbfc; transition: all 0.3s; margin-bottom: 30px; cursor: pointer; }
        .area-upload:hover { border-color: #8e44ad; background-color: #f5f0fa; }
        .icone-pdf { font-size: 60px; margin-bottom: 15px; }
        .area-upload h3 { margin: 0 0 10px 0; color: #2c3e50; font-size: 22px; }
        .area-upload p { margin: 0; color: #7f8c8d; }
        #input-arquivo { display: none; }

        .btn-converter { background-color: #8e44ad; color: white; border: none; padding: 15px 40px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; display: none; margin: 0 auto; }
        .btn-converter:hover { background-color: #7d3c98; transform: translateY(-2px); }
        .btn-converter:disabled { background-color: #bdc3c7; cursor: not-allowed; transform: none; }

        .area-progresso { display: none; margin-top: 30px; width: 100%; text-align: left; }
        .texto-progresso { display: flex; justify-content: space-between; margin-bottom: 10px; color: #2c3e50; font-weight: bold; }
        .barra-fundo { width: 100%; background-color: #ecf0f1; border-radius: 10px; height: 15px; overflow: hidden; }
        .barra-roxa { width: 0%; background-color: #8e44ad; height: 100%; transition: width 0.3s; }

        .sucesso { display: none; color: #27ae60; font-weight: bold; font-size: 18px; margin-top: 20px; }
        .btn-baixar { background-color: transparent; border: none; color: #8e44ad; text-decoration: underline; font-size: 18px; font-weight: bold; cursor: pointer; margin-left: 10px; }
        .btn-baixar:hover { color: #7d3c98; }
    </style>
</head>
<body>

    <div class="menu-lateral">
        <div class="logo">Ágora</div>
        <a href="dashboard.html">🏠 Início (Dashboard)</a>
        <a href="grupo.html">📝 Sala de Edição</a>
        <a href="#" style="border-left: 4px solid #8e44ad; color: white;">📄 Conversor PDF</a>
        <a href="index.html" style="margin-top: 50px;">🚪 Sair (Logout)</a>
    </div>

    <div class="conteudo">
        <div class="cabecalho-pagina">
            <h1>Transcrever e Gerar PDF</h1>
            <p>Selecione um arquivo de Texto (.txt) ou Word (.docx) para extrair o texto e gerar o PDF.</p>
        </div>

        <div class="caixa-conversor">
            <label for="input-arquivo">
                <div class="area-upload" id="zona-arrastar">
                    <div class="icone-pdf">📄➡📕</div>
                    <h3 id="texto-upload">Clique para escolher um arquivo</h3>
                    <p>Formatos suportados: .txt e .docx</p>
                </div>
            </label>
            <input type="file" id="input-arquivo" accept=".txt, .docx">

            <button id="btn-iniciar" class="btn-converter">Transcrever e Gerar PDF</button>

            <div class="area-progresso" id="box-progresso">
                <div class="texto-progresso">
                    <span id="status-texto">Lendo arquivo...</span>
                    <span id="status-porcentagem">0%</span>
                </div>
                <div class="barra-fundo">
                    <div class="barra-roxa" id="barra-animada"></div>
                </div>
            </div>

            <div class="sucesso" id="msg-sucesso">
                ✅ Arquivo transcrito e pronto! <button id="btn-baixar" class="btn-baixar">Baixar PDF Real</button>
            </div>
        </div>
    </div>

    <script>
        const inputArquivo = document.getElementById('input-arquivo');
        const textoUpload = document.getElementById('texto-upload');
        const btnIniciar = document.getElementById('btn-iniciar');
        
        let arquivoSelecionado = null;
        let textoTranscito = ""; // Variável que vai guardar o texto real do arquivo

        // 1. Quando escolhe o arquivo
        inputArquivo.addEventListener('change', function(e) {
            if(e.target.files.length > 0) {
                arquivoSelecionado = e.target.files[0];
                textoUpload.innerHTML = `Arquivo: <span style="color: #8e44ad;">${arquivoSelecionado.name}</span>`;
                btnIniciar.style.display = 'block';
                
                document.getElementById('box-progresso').style.display = 'none';
                document.getElementById('msg-sucesso').style.display = 'none';
                document.getElementById('barra-animada').style.width = '0%';
                btnIniciar.disabled = false;
            }
        });

        // 2. O processo de ler e carregar
        btnIniciar.addEventListener('click', function() {
            btnIniciar.disabled = true;
            document.getElementById('box-progresso').style.display = 'block';
            
            let progresso = 0;
            const barra = document.getElementById('barra-animada');
            const percentagem = document.getElementById('status-porcentagem');
            const textoStatus = document.getElementById('status-texto');

            // Primeiro: Lê o arquivo dependendo do tipo
            if (arquivoSelecionado.name.endsWith('.txt')) {
                const leitor = new FileReader();
                leitor.onload = function(evento) {
                    textoTranscito = evento.target.result;
                    animarBarra(); // Chama a animação depois de ler
                };
                leitor.readAsText(arquivoSelecionado);
            } 
            else if (arquivoSelecionado.name.endsWith('.docx')) {
                const leitor = new FileReader();
                leitor.onload = function(evento) {
                    const arrayBuffer = evento.target.result;
                    // Usa a biblioteca Mammoth para ler o DOCX
                    mammoth.extractRawText({arrayBuffer: arrayBuffer})
                        .then(function(resultado) {
                            textoTranscito = resultado.value;
                            animarBarra(); // Chama a animação depois de ler
                        })
                        .catch(function(erro) {
                            alert("Erro ao ler o documento Word. Tente outro.");
                        });
                };
                leitor.readAsArrayBuffer(arquivoSelecionado);
            } else {
                alert("Por favor, envie apenas arquivos .txt ou .docx");
                return;
            }

            // Função para a barra de carregamento
            function animarBarra() {
                textoStatus.innerText = "Gerando PDF...";
                const intervalo = setInterval(() => {
                    progresso += 20;
                    if(progresso >= 100) {
                        progresso = 100;
                        clearInterval(intervalo);
                        textoStatus.innerText = "Finalizado!";
                        document.getElementById('msg-sucesso').style.display = 'block';
                        btnIniciar.style.display = 'none';
                    }
                    barra.style.width = progresso + '%';
                    percentagem.innerText = progresso + '%';
                }, 150);
            }
        });

        // 3. Gerando o PDF com o texto real
        document.getElementById('btn-baixar').addEventListener('click', function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Adiciona o cabeçalho
            doc.setFontSize(16);
            doc.setTextColor(142, 68, 173);
            doc.text("Documento Transcrito - Ágora", 15, 20);
            
            // Restaura a cor e tamanho para o texto do usuário
            doc.setFontSize(11);
            doc.setTextColor(0, 0, 0);
            
            // O Segredo: Quebra o texto em várias linhas para não sumir da tela!
            // O 180 é a largura máxima da linha no papel A4
            const linhasDeTexto = doc.splitTextToSize(textoTranscito, 180);
            
            // Escreve o texto quebrado no PDF, começando da altura 35
            doc.text(linhasDeTexto, 15, 35);
            
            let nomeSemExtensao = arquivoSelecionado.name.split('.').slice(0, -1).join('.');
            doc.save(nomeSemExtensao + "_Convertido.pdf");
        });
    </script>
</body>
</html>
